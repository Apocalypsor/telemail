services:
  telemail-middleware:
    # 本地容器调试：生产默认由 worker/ 的 Cloudflare Container 托管。
    # context = repo root（不是 middleware/）—— bun workspace 子包，
    # Dockerfile 需要 root package.json + bun.lock 才能解析依赖
    build:
      context: ..
      dockerfile: middleware/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
