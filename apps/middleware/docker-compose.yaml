services:
  telemail-middleware:
    # 生产：CI 把镜像推到 GHCR，服务器 docker compose pull && up -d 拉取。
    # 本地开发：没有 image 时 docker compose 会自动用 build 段从源码编。
    # context = repo root（不是 apps/middleware/）—— bun workspace 子包，
    # Dockerfile 需要 root package.json + bun.lock 才能解析依赖。
    image: ghcr.io/apocalypsor/telemail-middleware:latest
    build:
      context: ../..
      dockerfile: apps/middleware/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      BRIDGE_SECRET: ${BRIDGE_SECRET:?BRIDGE_SECRET is required}
      TELEMAIL_URL: ${TELEMAIL_URL:?TELEMAIL_URL is required}
      PORT: ${PORT:-3000}
