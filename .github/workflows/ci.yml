name: CI / CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      page: ${{ steps.filter.outputs.page }}
      middleware: ${{ steps.filter.outputs.middleware }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'package.json'
            page:
              - 'page/**'
              - 'package.json'
            middleware:
              - 'middleware/**'
              - 'package.json'
              - '.dockerignore'

  ci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Biome check
        run: bun check
      - name: Typecheck (worker + page + middleware)
        run: bun typecheck
      - name: Build page
        run: bun build:page
      - name: Build middleware (compile sanity)
        run: bun build:middleware
      - uses: actions/upload-artifact@v7
        with:
          name: page-dist
          path: page/dist
          retention-days: 1
          if-no-files-found: error

  # ─── Worker ────────────────────────────────────────────────────────────────

  deploy-worker:
    name: Deploy Worker (production)
    needs: [ci, changes]
    if: |
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.worker == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-worker-prod
      cancel-in-progress: false
    outputs:
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      # wrangler.jsonc 是 gitignored 的 templated 文件，envsubst 从
      # wrangler.example.jsonc 生成：占位符 ${D1_DATABASE_ID} / ${KV_NAMESPACE_ID}
      # 由 repo secrets 填入
      - name: Generate wrangler.jsonc
        env:
          D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: envsubst < worker/wrangler.example.jsonc > worker/wrangler.jsonc
      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: worker
          command: deploy

  preview-worker:
    name: Preview Worker (PR version)
    needs: [ci, changes]
    if: |
      needs.changes.outputs.worker == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: preview-worker-${{ github.event.number }}
      cancel-in-progress: true
    outputs:
      url: ${{ steps.upload.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Generate wrangler.jsonc
        env:
          D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: envsubst < worker/wrangler.example.jsonc > worker/wrangler.jsonc
      - uses: cloudflare/wrangler-action@v3
        id: upload
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: worker
          command: versions upload --message=PR-${{ github.event.number }}-${{ github.event.pull_request.head.sha }}

  # ─── Pages ─────────────────────────────────────────────────────────────────

  deploy-page:
    name: Deploy Pages (production)
    needs: [ci, changes]
    if: |
      github.ref == 'refs/heads/main' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.page == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-page-prod
      cancel-in-progress: false
    outputs:
      url: ${{ steps.deploy.outputs.deployment-url }}
      alias_url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - uses: actions/download-artifact@v8
        with:
          name: page-dist
          path: page/dist
      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          command: pages deploy page/dist --project-name=telemail-web --branch=main --commit-hash=${{ github.sha }}

  preview-page:
    name: Preview Pages (PR)
    needs: [ci, changes]
    if: |
      needs.changes.outputs.page == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: preview-page-${{ github.event.number }}
      cancel-in-progress: true
    outputs:
      url: ${{ steps.deploy.outputs.deployment-url }}
      alias_url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - uses: actions/download-artifact@v8
        with:
          name: page-dist
          path: page/dist
      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          command: pages deploy page/dist --project-name=telemail-web --branch=${{ github.head_ref }} --commit-hash=${{ github.event.pull_request.head.sha }}

  # ─── Middleware (Docker, GHCR) ─────────────────────────────────────────────

  docker-middleware:
    name: Docker build / push (middleware)
    needs: [ci, changes]
    if: |
      needs.changes.outputs.middleware == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: docker-middleware-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: |
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/telemail-middleware
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=ref,event=pr
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: middleware/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=middleware
          cache-to: type=gha,scope=middleware,mode=max

  # ─── PR preview comment ────────────────────────────────────────────────────

  preview-comment:
    name: Comment PR with preview URLs
    needs: [changes, preview-worker, preview-page, docker-middleware]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (
        needs.preview-worker.result != 'skipped' ||
        needs.preview-page.result != 'skipped' ||
        needs.docker-middleware.result != 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/github-script@v8
        env:
          MODE: preview
          NEEDS: ${{ toJSON(needs) }}
        with:
          script: |
            const fn = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/post-comment.cjs`);
            await fn({ github, context });

  # ─── main commit comment ───────────────────────────────────────────────────

  deploy-comment:
    name: Comment commit with deploy URLs
    needs: [changes, deploy-worker, deploy-page, docker-middleware]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (
        needs.deploy-worker.result != 'skipped' ||
        needs.deploy-page.result != 'skipped' ||
        needs.docker-middleware.result != 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/github-script@v8
        env:
          MODE: deploy
          NEEDS: ${{ toJSON(needs) }}
        with:
          script: |
            const fn = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/post-comment.cjs`);
            await fn({ github, context });
